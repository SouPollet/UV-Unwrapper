<!DOCTYPE html>
<html>
<head>
</head>
<body>
  <h1>Test XAtlas Import</h1>
  <script src="/xatlas_web.js"></script>
  <script>
    setTimeout(() => {
        let matches = [];
        for (let key in window) {
            if (key.toLowerCase().includes('xatlas')) {
                matches.push({key, type: typeof window[key]});
            }
        }
        
        let output = {
            matches,
            hasXAtlas: typeof XAtlas !== 'undefined',
            XAtlasIs: typeof XAtlas !== 'undefined' ? typeof XAtlas : 'none',
        };
        
        fetch('http://localhost:8080/log', {
            method: 'POST',
            body: JSON.stringify(output)
        }).catch(e => console.error(e));
        
    }, 1000);
  </script>
</body>
</html>
